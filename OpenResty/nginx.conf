user www-data;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format gateway_log '$remote_addr - $remote_user [$time_local] "$request" '
                           'status=$status bytes=$body_bytes_sent '
                           'host="$host" backend="$upstream_addr" rt=$request_time';

    error_log  /usr/local/openresty/nginx/logs/error.log info;
    access_log /usr/local/openresty/nginx/logs/access.log gateway_log;

    include    mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    client_header_buffer_size 16k;
    large_client_header_buffers 4 32k;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 880;
        server_name _;

        location / {
            set $backend_address "";

            access_by_lua_block {
                local redis = require "resty.redis"
                local cjson = require "cjson"

                local red = redis:new()
                red:set_timeout(1500)

                local ok, err = red:connect("192.168.1.8", 6379)
                if not ok then
                    ngx.log(ngx.ERR, "Redis connect failed: ", err)
                    return ngx.exit(502)
                end

                -- =====================================================
                -- REQUEST INFO
                -- =====================================================
                local uri = ngx.var.uri
                local host = string.lower(ngx.var.host)
                host = string.gsub(host, ":%d+", "")

                ngx.log(ngx.NOTICE, "[DEBUG-INIT] Incoming URI: ", uri, " | Host: ", host)

                local is_backend = false
                local is_frontend = false
                local is_service = false

                if host == "nt113q22nhom12.ddns.net" then
                    if string.sub(uri, 1, 4) == "/api" or string.sub(uri, 1, 8) == "/chatHub" then
                        is_backend = true
                    else
                        is_frontend = true
                    end
                else
                    is_service = true
                end

                -- =====================================================
                -- LOAD TARGETS FROM REDIS (Theo cụm tài nguyên độc lập)
                -- =====================================================
                local targets = {}
                local redis_pattern = ""

                if is_backend then
                    redis_pattern = "domain:backend:" .. host .. ":*"
                elseif is_frontend then
                    redis_pattern = "domain:frontend:" .. host .. ":*"
                else
                    redis_pattern = "domain:service:" .. host .. ":*"
                end

                local keys, _ = red:keys(redis_pattern)
                if keys and keys ~= ngx.null and type(keys) == "table" then
                    for _, key in ipairs(keys) do
                        local node_ip = string.match(key, ":([^:]+)$")
                        if node_ip then
                            local ports, _ = red:smembers(key)
                            if ports and ports ~= ngx.null and type(ports) == "table" then
                                for _, port in ipairs(ports) do
                                    if port and port ~= "" then
                                        table.insert(targets, {
                                            ip = node_ip,
                                            port = port,
                                            target = node_ip .. ":" .. port
                                        })
                                    end
                                end
                            end
                        end
                    end
                end

                -- =====================================================
                -- NO TARGET FOUND
                -- =====================================================
                if #targets == 0 then
                    ngx.log(ngx.NOTICE, "[DEBUG-TARGETS] No route targets found for pattern: ", redis_pattern, ". Returning 404.")
                    red:set_keepalive(10000, 100)
                    return ngx.exit(404)
                end

                local chosen_node = ""
                local route_reason = ""

                -- =====================================================
                -- BACKEND ROUTING (Least Connection + Round Robin Tie-Breaker)
                -- =====================================================
                if is_backend then
                    ngx.ctx.is_api_request = true
                    local target_username = nil

                    if uri == "/api/login" then
                        ngx.req.read_body()
                        local body_data = ngx.req.get_body_data()
                        if body_data then
                            local success, post_args = pcall(cjson.decode, body_data)
                            if success and post_args then
                                target_username = post_args["username"] or post_args["Username"]
                            end
                        end
                    else
                        local token = nil
                        local auth_header = ngx.var.http_authorization
                        local token_arg = ngx.var.arg_access_token

                        if auth_header and string.sub(auth_header, 1, 7) == "Bearer " then
                            token = string.sub(auth_header, 8)
                        elseif token_arg and token_arg ~= "" then
                            token = token_arg
                        end

                        if token then
                            token = ngx.unescape_uri(token)
                            local parts = {}
                            for part in string.gmatch(token, "[^.]+") do
                                table.insert(parts, part)
                            end
                            
                            if #parts >= 2 then
                                local payload_b64 = parts[2]
                                local mod = #payload_b64 % 4
                                if mod > 0 then payload_b64 = payload_b64 .. string.rep("=", 4 - mod) end
                                payload_b64 = string.gsub(string.gsub(payload_b64, "-", "+"), "_", "/")
                                
                                local payload_json = ngx.decode_base64(payload_b64)
                                if payload_json then
                                    local success, payload = pcall(cjson.decode, payload_json)
                                    if success and payload then
                                        for k, v in pairs(payload) do
                                            local key_lower = string.lower(k)
                                            if key_lower == "unique_name" or key_lower == "name" or string.match(key_lower, "identity/claims/name$") then
                                                target_username = v
                                                break
                                            end
                                        end
                                    end
                                end
                            end
                        end
                    end

                    if target_username and target_username ~= "" then
                        local cleaned_user = string.lower(string.gsub(target_username, "^%s*(.-)%s*$", "%1"))
                        local session_key = "session:" .. cleaned_user
                        
                        local sticky_ip, _ = red:get(session_key)
                        
                        if sticky_ip and sticky_ip ~= ngx.null and type(sticky_ip) == "string" and sticky_ip ~= "" then
                            for _, node in ipairs(targets) do
                                if node.ip == sticky_ip then
                                    chosen_node = node.target
                                    route_reason = (uri == "/api/login") and "Login Sticky" or "JWT Sticky"
                                    break
                                end
                            end
                        end
                    end

                    if chosen_node == "" then
                        local min_load = math.huge
                        local node_loads = {}

                        for _, node in ipairs(targets) do
                            local load_val, _ = red:get("session:count:" .. node.ip)
                            local count = tonumber(load_val) or 0
                            node_loads[node.target] = count
                            if count < min_load then
                                min_load = count
                            end
                        end

                        local least_loaded_nodes = {}
                        for _, node in ipairs(targets) do
                            if node_loads[node.target] == min_load then
                                table.insert(least_loaded_nodes, node)
                            end
                        end

                        if #least_loaded_nodes == 1 then
                            chosen_node = least_loaded_nodes[1].target
                            route_reason = "Backend Least Connection (Single Minimum)"
                        else
                            local counter_key = "counter:backend_lb:" .. host
                            local count, _ = red:incr(counter_key)
                            count = tonumber(count) or 1

                            local index = ((count - 1) % #least_loaded_nodes) + 1
                            chosen_node = least_loaded_nodes[index].target
                            route_reason = "Backend Least Connection + Round Robin Tie-Breaker"
                        end
                    end
                end

                -- =====================================================
                -- FRONTEND ROUTING (Duy trì độc lập bằng Cookie)
                -- =====================================================
                if is_frontend then
                    local cookie_node = ngx.var.cookie_frontend_node
                    local is_new_session = false

                    if cookie_node and cookie_node ~= "" then
                        for _, node in ipairs(targets) do
                            if node.ip == cookie_node then
                                chosen_node = node.target
                                route_reason = "Frontend Sticky Cookie"
                                break
                            end
                        end
                    end

                    if chosen_node == "" then
                        local counter_key = "counter:frontend:" .. host
                        local count, _ = red:incr(counter_key)
                        count = tonumber(count) or 1

                        local index = ((count - 1) % #targets) + 1
                        chosen_node = targets[index].target
                        route_reason = "Frontend RoundRobin"
                        is_new_session = true
                    end

                    if is_new_session then
                        local extracted_ip = string.match(chosen_node, "^([^:]+)") or chosen_node
                        ngx.header["Set-Cookie"] = "frontend_node=" .. extracted_ip .. "; Path=/; Max-Age=3600; HttpOnly; SameSite=Lax"
                    end
                end

                -- =====================================================
                -- SERVICE ROUTING (Sửa đổi: Duy trì Sticky Cookie theo từng Host)
                -- =====================================================
                if is_service then
                    -- Tạo tên cookie an toàn dựa trên tên máy chủ (Ví dụ: shop_trial_nt113q22nhom12_ddns_net)
                    local safe_host_name = string.gsub(string.gsub(host, "%.", "_"), "%-", "_")
                    local cookie_name = "service_node_" .. safe_host_name
                    
                    -- Đọc giá trị cookie tương ứng từ client gửi lên
                    local cookie_target = ngx.var["cookie_" .. cookie_name]
                    local is_new_service_session = false

                    if cookie_target and cookie_target ~= "" then
                        for _, node in ipairs(targets) do
                            -- So khớp trực tiếp chuỗi định tuyến hoàn chỉnh (IP:PORT) để giữ đúng container xử lý
                            if node.target == cookie_target then
                                chosen_node = node.target
                                route_reason = "Service Sticky Cookie"
                                break
                            end
                        end
                    end

                    -- Nếu chưa có cookie hoặc dải port cũ của container đã bị hủy bỏ/thay đổi dải động
                    if chosen_node == "" then
                        local counter_key = "counter:service:" .. host
                        local count, _ = red:incr(counter_key)
                        count = tonumber(count) or 1

                        local index = ((count - 1) % #targets) + 1
                        chosen_node = targets[index].target
                        route_reason = "Service RoundRobin (Initial)"
                        is_new_service_session = true
                    end

                    -- Cập nhật Cookie xuống Client để cố định dải port xử lý cho các request tài nguyên kế tiếp
                    if is_new_service_session then
                        ngx.header["Set-Cookie"] = cookie_name .. "=" .. chosen_node .. "; Path=/; Max-Age=3600; HttpOnly; SameSite=Lax"
                    end
                end

                -- =====================================================
                -- FINAL EXECUTE
                -- =====================================================
                ngx.var.backend_address = chosen_node
                red:set_keepalive(10000, 100)

                ngx.log(ngx.NOTICE, "[ROUTING] URI=", uri, " | TARGET=", chosen_node, " | REASON=", route_reason)
            }

            proxy_pass http://$backend_address;

            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 5s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            proxy_buffering off;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }

    server {
        listen 80;
        server_name _;

        root /home/ubuntu/ChatOps/frontend;
        index index.html index.htm;

        location / {
            try_files $uri $uri/ /index.html;
            expires 1d;
        }

        location ~* \.(html|css|js)$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            try_files $uri =404;
        }
    }
}
